---
# Persistent Volume Claims for Monitoring Stack
# This prevents data loss on pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: search-engine
  labels:
    app: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  # storageClassName: gp3  # Uncomment and adjust for your cloud provider
  # For AWS EKS: gp3 or gp2
  # For GCP GKE: standard or pd-ssd
  # For Azure AKS: managed-premium

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: search-engine
  labels:
    app: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: gp3  # Uncomment and adjust for your cloud provider

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-pvc
  namespace: search-engine
  labels:
    app: alertmanager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: gp3  # Uncomment and adjust for your cloud provider

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: search-engine
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  namespace: search-engine
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - '/etc/prometheus/rules/*.yml'

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'spider'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: spider
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

      - job_name: 'conductor'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: conductor
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

      - job_name: 'cartographer'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: cartographer
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

      - job_name: 'searcher'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: searcher
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: search-engine
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.console.libraries=/usr/share/prometheus/console_libraries'
            - '--web.console.templates=/usr/share/prometheus/consoles'
          ports:
            - name: web
              containerPort: 9090
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus
            - name: prometheus-rules-volume
              mountPath: /etc/prometheus/rules
            - name: prometheus-storage-volume
              mountPath: /prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-server-conf
        - name: prometheus-rules-volume
          configMap:
            name: alert-rules
        - name: prometheus-storage-volume
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: search-engine

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: search-engine

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: search-engine
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: search-engine
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: web
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: search-engine-secrets
                  key: GRAFANA_PASSWORD
            - name: GF_INSTALL_PLUGINS
              value: ""
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: search-engine
  labels:
    app: grafana
data:
  core-metrics.json: |
    {"title": "Search Engine - Core Metrics", "description": "Production metrics using pre-aggregated recording rules. Select interval: 5s (real-time), 15s (default), 30s (lightweight), 60s (minimal).", "tags": ["search-engine", "core"], "timezone": "browser", "schemaVersion": 39, "version": 1, "refresh": "15s", "refreshIntervals": ["5s", "15s", "30s", "60s", "1m", "5m"], "uid": "core-metrics", "id": 1, "templating": {"list": [{"name": "interval", "type": "custom", "value": "1m", "options": [{"text": "5s", "value": "5s"}, {"text": "15s (default)", "value": "1m"}, {"text": "30s", "value": "30s"}, {"text": "60s", "value": "60s"}], "multi": false, "current": {"text": "15s (default)", "value": "1m"}}]}, "panels": [{"id": 1, "title": "Spider Pages Crawled/min", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}, "targets": [{"expr": "job:spider_crawl_rate:$interval", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 2, "title": "Spider Error Rate %", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}, "targets": [{"expr": "job:spider_error_rate:$interval * 100", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 3, "title": "Service Availability", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}, "targets": [{"expr": "count(job:up:instant == 1)", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 3}, {"color": "green", "value": 4}]}}, {"id": 4, "title": "Conductor Batches Processed/min", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}, "targets": [{"expr": "job:conductor_batches_rate:$interval", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 5, "title": "Conductor Queue Depth", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}, "targets": [{"expr": "job:conductor_queue_depth:instant", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUuid": "prometheus"}]}, {"id": 6, "title": "Pages Received/min", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}, "targets": [{"expr": "job:conductor_pages_received_rate:$interval", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 7, "title": "Spider Latency P95 (ms)", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 16}, "targets": [{"expr": "job:spider_latency_p95:5m * 1000", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 8, "title": "Conductor Latency P95 (ms)", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 16}, "targets": [{"expr": "job:conductor_latency_p95:5m * 1000", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 9, "title": "Searcher Queries/min", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 16}, "targets": [{"expr": "job:searcher_queries_rate:$interval", "refId": "A", "datasourceUid": "prometheus"}]}]}

  pod-health.json: |
    {"title": "Search Engine - Pod Health", "description": "Pod resource health using pre-aggregated metrics only\n\nConfigurable refresh: 5s (high-freq), 15s (default), 30s (low-overhead), 60s (minimal)", "tags": ["search-engine", "health"], "timezone": "browser", "schemaVersion": 39, "version": 1, "refresh": "15s", "uid": "pod-health", "id": 3, "templating": {"list": [{"name": "interval", "type": "custom", "value": "1m", "options": [{"text": "5s", "value": "5s"}, {"text": "15s (default)", "value": "1m"}, {"text": "30s", "value": "30s"}, {"text": "60s", "value": "60s"}], "multi": false, "current": {"text": "15s (default)", "value": "1m"}}]}, "panels": [{"id": 1, "title": "Service Availability", "type": "stat", "gridPos": {"h": 4, "w": 12, "x": 0, "y": 0}, "targets": [{"expr": "count(job:up:instant == 1)", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 3}, {"color": "green", "value": 4}]}}, {"id": 2, "title": "CPU Usage by Service", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "targets": [{"expr": "job:cpu_usage:$interval * 100", "legendFormat": "{{job}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 3, "title": "Memory Usage (MB)", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}, "targets": [{"expr": "job:memory_usage_mb:instant", "legendFormat": "{{job}}", "refId": "A", "datasourceUid": "prometheus"}]}], "refreshIntervals": ["5s", "15s", "30s", "60s", "1m", "5m"]}

  detailed-metrics.json: |
    {"title": "Search Engine - Detailed Metrics", "description": "Detailed per-spider and cartographer metrics. Select interval: 5s, 15s (default), 30s, 60s.", "tags": ["search-engine", "detailed"], "timezone": "browser", "schemaVersion": 39, "version": 1, "refresh": "15s", "refreshIntervals": ["5s", "15s", "30s", "60s", "1m", "5m"], "uid": "detailed-metrics", "id": 4, "templating": {"list": [{"name": "interval", "type": "custom", "value": "1m", "options": [{"text": "5s", "value": "5s"}, {"text": "15s (default)", "value": "1m"}, {"text": "30s", "value": "30s"}, {"text": "60s", "value": "60s"}], "multi": false, "current": {"text": "15s (default)", "value": "1m"}}]}, "panels": [{"id": 1, "title": "Cartographer Status", "type": "stat", "gridPos": {"h": 4, "w": 12, "x": 0, "y": 0}, "targets": [{"expr": "time() - cartographer:last_task_timestamp:instant", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "unit": "s", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 600}, {"color": "red", "value": 1200}]}}, {"id": 2, "title": "Crawl Rate by Spider Instance", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "targets": [{"expr": "spider:crawl_rate:1m", "legendFormat": "{{instance}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 3, "title": "Spider Error Rate by Instance", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}, "targets": [{"expr": "spider:error_rate:1m * 100", "legendFormat": "{{instance}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 4, "title": "Total Crawl Rate (All Spiders)", "type": "stat", "gridPos": {"h": 4, "w": 12, "x": 12, "y": 0}, "targets": [{"expr": "sum(spider:crawl_rate:1m)", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1}, {"color": "green", "value": 2}]}}, {"id": 5, "title": "Pages Failed by Spider", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}, "targets": [{"expr": "rate(spider_pages_failed_total[1m])", "legendFormat": "{{instance}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 6, "title": "Pages Fetched by Spider", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}, "targets": [{"expr": "rate(spider_pages_fetched_total[1m])", "legendFormat": "{{instance}}", "refId": "A", "datasourceUid": "prometheus"}]}]}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: search-engine
  labels:
    app: grafana
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: search-engine
  labels:
    app: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'Search Engine Dashboards'
        orgId: 1
        folder: 'Search Engine'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: search-engine
  labels:
    app: grafana
data:
  search-engine-overview.json: |
    {
      "title": "Search Engine Overview",
      "tags": ["search-engine", "microservices"],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 3,
      "refresh": "15s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "title": "Search Requests per Second",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(searcher_queries_processed_total{status=\"success\"}[5m]))",
              "legendFormat": "success",
              "refId": "A"
            },
            {
              "expr": "sum(rate(searcher_queries_processed_total{status=\"no_results\"}[5m]))",
              "legendFormat": "no results",
              "refId": "B"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "title": "Search Latency (p50, p95, p99)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(searcher_query_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(searcher_query_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(searcher_query_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 8},
          "id": 3,
          "title": "Searches (1h)",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(increase(searcher_queries_processed_total{status=\"success\"}[1h]))",
              "refId": "A"
            }
          ],
          "options": {"colorMode": "value", "graphMode": "area", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}}
        },
        {
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 8},
          "id": 4,
          "title": "No Results Rate (5m)",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(rate(searcher_queries_processed_total{status=\"no_results\"}[5m])) / sum(rate(searcher_queries_processed_total[5m]))",
              "refId": "A"
            }
          ],
          "options": {"colorMode": "background", "textMode": "value"},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "noValue": "0%",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.3},
                  {"color": "red", "value": 0.6}
                ]
              }
            }
          }
        },
        {
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 8},
          "id": 10,
          "title": "Avg Results Returned",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(rate(searcher_results_returned_sum[5m])) / sum(rate(searcher_results_returned_count[5m]))",
              "refId": "A"
            }
          ],
          "options": {"colorMode": "value", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 1, "noValue": "N/A"}}
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 5,
          "title": "Service Status",
          "type": "stat",
          "targets": [
            {"expr": "max(up{job=\"searcher\"})", "legendFormat": "Searcher", "refId": "A"},
            {"expr": "max(up{job=\"spider\"})", "legendFormat": "Spider", "refId": "B"},
            {"expr": "max(up{job=\"conductor\"})", "legendFormat": "Conductor", "refId": "C"},
            {"expr": "max(up{job=\"cartographer\"}) OR vector(0)", "legendFormat": "Cartographer", "refId": "D"}
          ],
          "options": {"colorMode": "background", "textMode": "name", "orientation": "horizontal"},
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "mappings": [
                {"type": "value", "options": {"0": {"text": "Down"}, "1": {"text": "Up"}}}
              ]
            }
          }
        },
        {
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 12},
          "id": 6,
          "title": "Active Crawls",
          "type": "stat",
          "targets": [
            {"expr": "sum(spider_active_crawls)", "refId": "A"}
          ],
          "options": {"colorMode": "value", "graphMode": "area", "textMode": "value"},
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "green", "value": 5}
                ]
              }
            }
          }
        },
        {
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 12},
          "id": 7,
          "title": "Spider Queue Depth",
          "type": "stat",
          "targets": [
            {"expr": "sum(spider_queue_depth)", "refId": "A"}
          ],
          "options": {"colorMode": "value", "graphMode": "area", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}}
        },
        {
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 12},
          "id": 11,
          "title": "Robots Blocked (total)",
          "type": "stat",
          "targets": [
            {"expr": "sum(spider_robots_blocked_total)", "refId": "A"}
          ],
          "options": {"colorMode": "value", "textMode": "value"},
          "fieldConfig": {"defaults": {"unit": "short", "decimals": 0}}
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "id": 8,
          "title": "Conductor Ingestion Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(conductor_pages_received_total[5m]))",
              "legendFormat": "received/sec",
              "refId": "A"
            },
            {
              "expr": "sum(rate(conductor_new_pages_stored_total[5m]))",
              "legendFormat": "new stored/sec",
              "refId": "B"
            },
            {
              "expr": "sum(rate(conductor_duplicates_found_total[5m]))",
              "legendFormat": "duplicates/sec",
              "refId": "C"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "id": 9,
          "title": "Spider Failures by Reason",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(spider_pages_failed_total{reason=\"not_found\"}[5m]))",
              "legendFormat": "404 not found",
              "refId": "A"
            },
            {
              "expr": "sum(rate(spider_pages_failed_total{reason=\"cycle\"}[5m]))",
              "legendFormat": "cycle detected",
              "refId": "B"
            },
            {
              "expr": "sum(rate(spider_pages_failed_total{reason=\"forbidden\"}[5m]))",
              "legendFormat": "403 forbidden",
              "refId": "C"
            },
            {
              "expr": "sum(rate(spider_pages_failed_total{reason=\"server_error\"}[5m]))",
              "legendFormat": "5xx server error",
              "refId": "D"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "reqps"}}
        }
      ]
    }

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: search-engine
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: 9093
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: search-engine
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          imagePullPolicy: IfNotPresent
          args:
            - '--config.file=/etc/alertmanager/config.yml'
            - '--storage.path=/alertmanager'
          ports:
            - name: web
              containerPort: 9093
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
            - name: alertmanager-storage
              mountPath: /alertmanager
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
        - name: alertmanager-storage
          persistentVolumeClaim:
            claimName: alertmanager-pvc

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: search-engine
  labels:
    app: alertmanager
data:
  config.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: 'null'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

        - match:
            severity: warning
          receiver: 'warning'
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 12h

    receivers:
      - name: 'null'
      - name: 'critical'
      - name: 'warning'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'cluster', 'service']
