---
# Persistent Volume Claims for Monitoring Stack
# This prevents data loss on pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: search-engine
  labels:
    app: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  # storageClassName: gp3  # Uncomment and adjust for your cloud provider
  # For AWS EKS: gp3 or gp2
  # For GCP GKE: standard or pd-ssd
  # For Azure AKS: managed-premium

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: search-engine
  labels:
    app: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # storageClassName: gp3  # Uncomment and adjust for your cloud provider

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-pvc
  namespace: search-engine
  labels:
    app: alertmanager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: gp3  # Uncomment and adjust for your cloud provider

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: search-engine
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  namespace: search-engine
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - '/etc/prometheus/rules/*.yml'

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'spider'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: spider
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics

      - job_name: 'conductor'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: conductor
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics

      - job_name: 'cartographer'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: cartographer
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics

      - job_name: 'searcher'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: searcher
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: search-engine
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          imagePullPolicy: IfNotPresent
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.console.libraries=/usr/share/prometheus/console_libraries'
            - '--web.console.templates=/usr/share/prometheus/consoles'
          ports:
            - name: web
              containerPort: 9090
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus
            - name: prometheus-rules-volume
              mountPath: /etc/prometheus/rules
            - name: prometheus-storage-volume
              mountPath: /prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-server-conf
        - name: prometheus-rules-volume
          configMap:
            name: alert-rules
        - name: prometheus-storage-volume
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: search-engine

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
spec:
  rules:
    - apiGroups: [""]
      resources:
        - nodes
        - nodes/proxy
        - services
        - endpoints
        - pods
      verbs: ["get", "list", "watch"]
    - apiGroups: ["extensions"]
      resources:
        - ingresses
      verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: search-engine

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: search-engine
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: search-engine
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: web
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: search-engine-secrets
                  key: GRAFANA_PASSWORD
            - name: GF_INSTALL_PLUGINS
              value: ""
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: search-engine
  labels:
    app: grafana
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: search-engine
  labels:
    app: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'Search Engine Dashboards'
        orgId: 1
        folder: 'Search Engine'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: search-engine
  labels:
    app: grafana
data:
  search-engine-overview.json: |
    {
      "title": "Search Engine Overview",
      "tags": ["search-engine", "microservices"],
      "timezone": "browser",
      "schemaVersion": 16,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "title": "Search Requests per Second",
          "type": "graph",
          "targets": [
            {
              "expr": "rate(frontend_search_requests_total[5m])",
              "legendFormat": "{{status}}",
              "refId": "A"
            }
          ],
          "yaxes": [{"format": "reqps", "label": "Requests/sec"}]
        },
        {
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "title": "Search Latency (p50, p95, p99)",
          "type": "graph",
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(frontend_search_duration_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, rate(frontend_search_duration_seconds_bucket[5m]))",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, rate(frontend_search_duration_seconds_bucket[5m]))",
              "legendFormat": "p99",
              "refId": "C"
            }
          ],
          "yaxes": [{"format": "s", "label": "Duration"}]
        },
        {
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 8},
          "id": 3,
          "title": "Total Searches (1h)",
          "type": "stat",
          "targets": [
            {
              "expr": "increase(frontend_search_requests_total{status=\"success\"}[1h])",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0
            }
          }
        },
        {
          "gridPos": {"h": 6, "w": 6, "x": 6, "y": 8},
          "id": 4,
          "title": "Error Rate",
          "type": "stat",
          "targets": [
            {
              "expr": "rate(frontend_search_requests_total{status=\"error\"}[5m]) / rate(frontend_search_requests_total[5m])",
              "refId": "A"
            }
          ],
          "options": {
            "colorMode": "value",
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.01},
                  {"color": "red", "value": 0.05}
                ]
              }
            }
          }
        },
        {
          "gridPos": {"h": 6, "w": 12, "x": 12, "y": 8},
          "id": 5,
          "title": "Service Status",
          "type": "stat",
          "targets": [
            {"expr": "up{job=\"frontend\"}", "legendFormat": "Frontend", "refId": "A"},
            {"expr": "up{job=\"searcher\"}", "legendFormat": "Searcher", "refId": "B"},
            {"expr": "up{job=\"spider\"}", "legendFormat": "Spider", "refId": "C"},
            {"expr": "up{job=\"conductor\"}", "legendFormat": "Conductor", "refId": "D"},
            {"expr": "up{job=\"cartographer\"}", "legendFormat": "Cartographer", "refId": "E"}
          ],
          "options": {
            "colorMode": "value",
            "textMode": "name"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "mappings": [
                {"type": "value", "value": "0", "text": "Down"},
                {"type": "value", "value": "1", "text": "Up"}
              ]
            }
          }
        }
      ]
    }

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: search-engine
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: 9093
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: search-engine
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          imagePullPolicy: IfNotPresent
          args:
            - '--config.file=/etc/alertmanager/config.yml'
            - '--storage.path=/alertmanager'
          ports:
            - name: web
              containerPort: 9093
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
            - name: alertmanager-storage
              mountPath: /alertmanager
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
        - name: alertmanager-storage
          persistentVolumeClaim:
            claimName: alertmanager-pvc

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: search-engine
  labels:
    app: alertmanager
data:
  config.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: 'null'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h

        - match:
            severity: warning
          receiver: 'warning'
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 12h

    receivers:
      - name: 'null'
      - name: 'critical'
      - name: 'warning'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'cluster', 'service']
