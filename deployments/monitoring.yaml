---
# Persistent Volume Claims for Monitoring Stack
# This prevents data loss on pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: search-engine
  labels:
    app: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: hcloud-volumes

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: search-engine
  labels:
    app: grafana
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: hcloud-volumes

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-pvc
  namespace: search-engine
  labels:
    app: alertmanager
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: hcloud-volumes

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: search-engine
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server-conf
  namespace: search-engine
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - '/etc/prometheus/rules/*.yml'

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'spider'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: spider
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

      - job_name: 'conductor'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: conductor
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

      - job_name: 'cartographer'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: cartographer
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

      - job_name: 'searcher'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: searcher
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

      - job_name: 'frontend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: frontend
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: $1:8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: search-engine
  labels:
    app: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.4.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.console.libraries=/usr/share/prometheus/console_libraries'
            - '--web.console.templates=/usr/share/prometheus/consoles'
          ports:
            - name: web
              containerPort: 9090
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus
            - name: prometheus-rules-volume
              mountPath: /etc/prometheus/rules
            - name: prometheus-storage-volume
              mountPath: /prometheus
      volumes:
        - name: prometheus-config-volume
          configMap:
            name: prometheus-server-conf
        - name: prometheus-rules-volume
          projected:
            sources:
              - configMap:
                  name: alert-rules
              - configMap:
                  name: prometheus-recording-rules
        - name: prometheus-storage-volume
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: search-engine

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: search-engine

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: search-engine
  labels:
    app: grafana
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: search-engine
  labels:
    app: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.6.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: web
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: search-engine-secrets
                  key: GRAFANA_PASSWORD
            - name: GF_INSTALL_PLUGINS
              value: ""
            # Anonymous viewer access, scoped to the "Public" folder via that
            # folder's permissions (set once via the Grafana API after
            # deploy - not expressible in this file). The "Search Engine"
            # folder's permissions are tightened at the same time so
            # anonymous Viewers can't browse the internal ops dashboards.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_AUTH_ANONYMOUS_HIDE_VERSION
              value: "true"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-dashboards-public
              mountPath: /var/lib/grafana/dashboards/public
      volumes:
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
        - name: grafana-dashboards-public
          configMap:
            name: grafana-dashboards-public

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: search-engine
  labels:
    app: grafana
data:
  core-metrics.json: |
    {"title": "Search Engine - Core Metrics", "description": "Production metrics using pre-aggregated recording rules. Select interval: 5s (real-time), 15s (default), 30s (lightweight), 60s (minimal).", "tags": ["search-engine", "core"], "timezone": "browser", "schemaVersion": 39, "version": 1, "refresh": "15s", "refreshIntervals": ["5s", "15s", "30s", "60s", "1m", "5m"], "uid": "core-metrics", "id": 1, "templating": {"list": [{"name": "interval", "type": "custom", "value": "1m", "options": [{"text": "5s", "value": "5s"}, {"text": "15s (default)", "value": "1m"}, {"text": "30s", "value": "30s"}, {"text": "60s", "value": "60s"}], "multi": false, "current": {"text": "15s (default)", "value": "1m"}}]}, "panels": [{"id": 1, "title": "Spider Pages Crawled/min", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 0}, "targets": [{"expr": "job:spider_crawl_rate:$interval", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 2, "title": "Spider Error Rate %", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0}, "targets": [{"expr": "job:spider_error_rate:$interval * 100", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 3, "title": "Service Availability", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 0}, "targets": [{"expr": "count(job:up:instant == 1)", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 3}, {"color": "green", "value": 4}]}}, {"id": 4, "title": "Conductor Batches Processed/min", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 8}, "targets": [{"expr": "job:conductor_batches_rate:$interval", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 5, "title": "Conductor Queue Depth", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 8}, "targets": [{"expr": "job:conductor_queue_depth:instant", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUuid": "prometheus"}]}, {"id": 6, "title": "Pages Received/min", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 8}, "targets": [{"expr": "job:conductor_pages_received_rate:$interval", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 7, "title": "Spider Latency P95 (ms)", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 16}, "targets": [{"expr": "job:spider_latency_p95:5m * 1000", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 8, "title": "Conductor Latency P95 (ms)", "type": "timeseries", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 16}, "targets": [{"expr": "job:conductor_latency_p95:5m * 1000", "legendFormat": "{{__name__}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 9, "title": "Searcher Queries/min", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 16}, "targets": [{"expr": "job:searcher_queries_rate:$interval", "refId": "A", "datasourceUid": "prometheus"}]}]}

  pod-health.json: |
    {"title": "Search Engine - Pod Health", "description": "Pod resource health using pre-aggregated metrics only\n\nConfigurable refresh: 5s (high-freq), 15s (default), 30s (low-overhead), 60s (minimal)", "tags": ["search-engine", "health"], "timezone": "browser", "schemaVersion": 39, "version": 1, "refresh": "15s", "uid": "pod-health", "id": 3, "templating": {"list": [{"name": "interval", "type": "custom", "value": "1m", "options": [{"text": "5s", "value": "5s"}, {"text": "15s (default)", "value": "1m"}, {"text": "30s", "value": "30s"}, {"text": "60s", "value": "60s"}], "multi": false, "current": {"text": "15s (default)", "value": "1m"}}]}, "panels": [{"id": 1, "title": "Service Availability", "type": "stat", "gridPos": {"h": 4, "w": 12, "x": 0, "y": 0}, "targets": [{"expr": "count(job:up:instant == 1)", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 3}, {"color": "green", "value": 4}]}}, {"id": 2, "title": "CPU Usage by Service", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "targets": [{"expr": "job:cpu_usage:$interval * 100", "legendFormat": "{{job}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 3, "title": "Memory Usage (MB)", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}, "targets": [{"expr": "job:memory_usage_mb:instant", "legendFormat": "{{job}}", "refId": "A", "datasourceUid": "prometheus"}]}], "refreshIntervals": ["5s", "15s", "30s", "60s", "1m", "5m"]}

  detailed-metrics.json: |
    {"title": "Search Engine - Detailed Metrics", "description": "Detailed per-spider and cartographer metrics. Select interval: 5s, 15s (default), 30s, 60s.", "tags": ["search-engine", "detailed"], "timezone": "browser", "schemaVersion": 39, "version": 1, "refresh": "15s", "refreshIntervals": ["5s", "15s", "30s", "60s", "1m", "5m"], "uid": "detailed-metrics", "id": 4, "templating": {"list": [{"name": "interval", "type": "custom", "value": "1m", "options": [{"text": "5s", "value": "5s"}, {"text": "15s (default)", "value": "1m"}, {"text": "30s", "value": "30s"}, {"text": "60s", "value": "60s"}], "multi": false, "current": {"text": "15s (default)", "value": "1m"}}]}, "panels": [{"id": 1, "title": "Cartographer Sweeps Completed (6h)", "type": "stat", "gridPos": {"h": 4, "w": 12, "x": 0, "y": 0}, "targets": [{"expr": "cartographer:sweeps_completed:6h", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, {"id": 2, "title": "Crawl Rate by Spider Instance", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4}, "targets": [{"expr": "spider:crawl_rate:1m", "legendFormat": "{{instance}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 3, "title": "Spider Error Rate by Instance", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4}, "targets": [{"expr": "spider:error_rate:1m * 100", "legendFormat": "{{instance}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 4, "title": "Total Crawl Rate (All Spiders)", "type": "stat", "gridPos": {"h": 4, "w": 12, "x": 12, "y": 0}, "targets": [{"expr": "sum(spider:crawl_rate:1m)", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1}, {"color": "green", "value": 2}]}}, {"id": 5, "title": "Pages Failed by Spider", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12}, "targets": [{"expr": "rate(spider_pages_failed_total[1m])", "legendFormat": "{{instance}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 6, "title": "Pages Fetched by Spider", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12}, "targets": [{"expr": "rate(spider_pages_fetched_total[1m])", "legendFormat": "{{instance}}", "refId": "A", "datasourceUid": "prometheus"}]}]}

  key-metrics.json: |
    {"title": "Search Engine - Key Metrics", "description": "Consolidated key-metrics dashboard: pipeline health (spider->conductor ingestion), search-facing traffic/latency, and cartographer/PageRank freshness. Select interval: 5s (real-time), 15s (default), 30s (lightweight), 60s (minimal).", "tags": ["search-engine", "key-metrics"], "timezone": "browser", "schemaVersion": 39, "version": 1, "refresh": "15s", "refreshIntervals": ["5s", "15s", "30s", "60s", "1m", "5m"], "uid": "key-metrics", "id": 5, "templating": {"list": [{"name": "interval", "type": "custom", "value": "1m", "options": [{"text": "5s", "value": "5s"}, {"text": "15s (default)", "value": "1m"}, {"text": "30s", "value": "30s"}, {"text": "60s", "value": "60s"}], "multi": false, "current": {"text": "15s (default)", "value": "1m"}}]}, "panels": [{"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0}, "id": 1, "title": "Pipeline Health", "type": "row"}, {"id": 2, "title": "Service Availability", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 1}, "targets": [{"expr": "count(job:up:instant == 1)", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 3}, {"color": "green", "value": 5}]}}, {"id": 3, "title": "Conductor Queue Depth", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 1}, "targets": [{"expr": "job:conductor_queue_depth:instant", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 4, "title": "Spider Queue Depth", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 1}, "targets": [{"expr": "spider_queue_depth", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 5, "title": "Conductor Ingestion: Received vs Stored vs Duplicates", "type": "timeseries", "description": "If 'received' flatlines while Spider's crawl rate (below) is nonzero, Conductor has lost its connection to Spider.", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 9}, "targets": [{"expr": "job:conductor_pages_received_rate:$interval", "legendFormat": "received", "refId": "A", "datasourceUid": "prometheus"}, {"expr": "rate(conductor_new_pages_stored_total[$interval])", "legendFormat": "stored", "refId": "B", "datasourceUid": "prometheus"}, {"expr": "rate(conductor_duplicates_found_total[$interval])", "legendFormat": "duplicates", "refId": "C", "datasourceUid": "prometheus"}]}, {"id": 6, "title": "Spider Crawl Rate vs Error Rate %", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 9}, "targets": [{"expr": "job:spider_crawl_rate:$interval", "legendFormat": "pages/sec", "refId": "A", "datasourceUid": "prometheus"}, {"expr": "job:spider_error_rate:$interval * 100", "legendFormat": "error %", "refId": "B", "datasourceUid": "prometheus"}]}, {"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 17}, "id": 7, "title": "Search-Facing", "type": "row"}, {"id": 8, "title": "Frontend Search Requests/sec by Status", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 18}, "targets": [{"expr": "rate(frontend_search_requests_total[$interval])", "legendFormat": "{{status}}", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 9, "title": "Frontend + Searcher P95 Latency (ms)", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 18}, "targets": [{"expr": "histogram_quantile(0.95, sum(rate(frontend_search_duration_seconds_bucket[5m])) by (le)) * 1000", "legendFormat": "frontend", "refId": "A", "datasourceUid": "prometheus"}, {"expr": "job:searcher_latency_p95:5m * 1000", "legendFormat": "searcher", "refId": "B", "datasourceUid": "prometheus"}]}, {"id": 10, "title": "Searcher Queries/min", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 26}, "targets": [{"expr": "job:searcher_queries_rate:$interval", "refId": "A", "datasourceUid": "prometheus"}]}, {"id": 11, "title": "Searcher DB Errors (rate)", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 26}, "targets": [{"expr": "rate(searcher_database_errors_total[$interval])", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 0.01}]}}, {"id": 12, "title": "Active Search Indices", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 26}, "targets": [{"expr": "searcher_total_indices", "refId": "A", "datasourceUid": "prometheus"}]}, {"collapsed": false, "gridPos": {"h": 1, "w": 24, "x": 0, "y": 34}, "id": 13, "title": "Cartographer / PageRank Freshness", "type": "row"}, {"id": 14, "title": "Active Sweep Now", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 0, "y": 35}, "targets": [{"expr": "cartographer:active_sweep:instant", "refId": "A", "datasourceUid": "prometheus"}], "options": {"colorMode": "value", "graphMode": "none", "textMode": "value_and_name"}, "fieldConfig": {"defaults": {"mappings": [{"type": "value", "value": "0", "text": "Idle"}, {"type": "value", "value": "1", "text": "Running"}], "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}, {"color": "yellow", "value": 1}]}}}}, {"id": 15, "title": "Sweeps Completed (6h)", "type": "stat", "description": "Cartographer's CronJob runs every 6h. If this is 0, PageRank has stopped recomputing (this caught a real 22-day-long outage).", "gridPos": {"h": 8, "w": 8, "x": 8, "y": 35}, "targets": [{"expr": "cartographer:sweeps_completed:6h", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}, {"id": 16, "title": "Cartographer Errors (6h)", "type": "stat", "gridPos": {"h": 8, "w": 8, "x": 16, "y": 35}, "targets": [{"expr": "increase(cartographer_errors_total[6h])", "refId": "A", "datasourceUid": "prometheus"}], "color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, {"id": 17, "title": "Pages Ranked Rate & Avg Sweep Duration", "type": "timeseries", "gridPos": {"h": 8, "w": 24, "x": 0, "y": 43}, "targets": [{"expr": "rate(cartographer_pages_ranked_total[$interval])", "legendFormat": "pages ranked/sec", "refId": "A", "datasourceUid": "prometheus"}, {"expr": "rate(cartographer_sweep_duration_seconds_sum[$interval]) / rate(cartographer_sweep_duration_seconds_count[$interval])", "legendFormat": "avg sweep duration (s)", "refId": "B", "datasourceUid": "prometheus"}]}]}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-public
