---
apiVersion: v1
kind: Service
metadata:
  name: cartographer
  namespace: search-engine
  labels:
    app: cartographer
spec:
  type: ClusterIP
  selector:
    app: cartographer
  ports:
    - name: health
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cartographer
  namespace: search-engine
  labels:
    app: cartographer
spec:
  # Run every 6 hours
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: cartographer
            job-type: pagerank-computation
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9090"
            prometheus.io/path: "/metrics"
        spec:
          serviceAccountName: cartographer
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 120
          containers:
            - name: cartographer
              image: cartographer:latest
              imagePullPolicy: IfNotPresent
              ports:
                - name: health
                  containerPort: 8080
                  protocol: TCP
                - name: metrics
                  containerPort: 9090
                  protocol: TCP
              env:
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: search-engine-secrets
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: search-engine-secrets
                      key: DB_PASSWORD
                - name: DB_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: search-engine-config
                      key: DB_HOST
                - name: DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: search-engine-config
                      key: DB_NAME
                - name: CARTOGRAPHER_HEALTH_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: search-engine-config
                      key: CARTOGRAPHER_HEALTH_PORT
                - name: ENVIRONMENT
                  valueFrom:
                    configMapKeyRef:
                      name: search-engine-config
                      key: ENVIRONMENT
                - name: LOG_LEVEL
                  valueFrom:
                    configMapKeyRef:
                      name: search-engine-config
                      key: LOG_LEVEL
              resources:
                requests:
                  cpu: 1
                  memory: 1Gi
                limits:
                  cpu: 4
                  memory: 4Gi
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: health
                  scheme: HTTP
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cartographer
  namespace: search-engine
  labels:
    app: cartographer

