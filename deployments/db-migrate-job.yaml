---
# Database migration Job - runs once before services start.
# Re-apply safely: Job uses a unique name suffix or relies on idempotent SQL (IF NOT EXISTS).
# To re-run migrations, delete this Job and re-apply: kubectl delete job db-migrate -n search-engine
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: search-engine
  labels:
    app: db-migrate
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U $POSTGRES_USER; do
                echo "Waiting for postgres..."
                sleep 2
              done
              echo "Postgres is ready."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: search-engine-secrets
                  key: DB_USER
      containers:
        - name: migrate
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              echo "Running migrations against $DB_HOST:5432/$DB_NAME..."
              PGPASSWORD=$DB_PASSWORD psql \
                -h "$DB_HOST" \
                -U "$DB_USER" \
                -d "$DB_NAME" \
                -f /migrations/01-init-schema.sql
              echo "Migrations complete."
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: search-engine-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: search-engine-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: search-engine-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: search-engine-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: postgres-init-scripts
