---
# All external traffic enters through the single Traefik load balancer.
# Replace search.yourdomain.com and metrics.yourdomain.com with your actual domain.
# Both DNS A records should point to the same Traefik load balancer IP.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: search-engine
  namespace: search-engine
  labels:
    app: search-engine
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: search.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    - host: metrics.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: search-engine-network-policy
  namespace: search-engine
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: search-engine
    - from:
        - podSelector: {}
          namespaceSelector:
            matchLabels:
              name: search-engine

  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    - to:
        - podSelector: {}
          namespaceSelector:
            matchLabels:
              name: search-engine

    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
