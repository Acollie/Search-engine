---
# All external traffic enters through the single Traefik load balancer.
# HTTP (port 80) redirects permanently to HTTPS via Traefik's web→websecure redirect.
# Certificates are issued automatically by Let's Encrypt via cert-manager.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: search-engine
  namespace: search-engine
  labels:
    app: search-engine
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - search.collie.codes
        - metrics.collie.codes
      secretName: search-engine-tls
  rules:
    - host: search.collie.codes
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    - host: metrics.collie.codes
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
