---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: search-engine
  namespace: search-engine
  labels:
    app: search-engine
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - search-engine.example.com
        - grafana.example.com
      secretName: search-engine-tls
  rules:
    # Main search engine frontend
    - host: search-engine.example.com
      http:
        paths:
          # Frontend web interface (root path)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # Direct API access (optional, for debugging)
          - path: /api/search
            pathType: Prefix
            backend:
              service:
                name: searcher
                port:
                  number: 9002
          # Health checks
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080

    # Grafana monitoring
    - host: grafana.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  name: web

    # Prometheus metrics
    - host: search-engine.example.com
      http:
        paths:
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  name: web

---
# Optional: Network Policy for internal service communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: search-engine-network-policy
  namespace: search-engine
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

  # Allow ingress from within namespace
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: search-engine
    - from:
        - podSelector: {}
          namespaceSelector:
            matchLabels:
              name: search-engine

  # Allow egress to services, DNS, and external APIs
  egress:
    # DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53

    # Kubernetes API
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    # Internal services
    - to:
        - podSelector: {}
          namespaceSelector:
            matchLabels:
              name: search-engine

    # External API calls (web crawling)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443

---
# Optional: Pod Security Policy (if using PSP)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: search-engine
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'MustRunAs'
    seLinuxOptions:
      level: 's0:c123,c456'
  fsGroup:
    rule: 'MustRunAs'
    ranges:
      - min: 1000
        max: 65535
  readOnlyRootFilesystem: true
