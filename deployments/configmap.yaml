---
apiVersion: v1
kind: ConfigMap
metadata:
  name: search-engine-config
  namespace: search-engine
  labels:
    app: search-engine
data:
  # Environment configuration for all services
  ENVIRONMENT: production
  LOG_LEVEL: info

  # Database configuration
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: databaseName
  DB_SSL_MODE: "disable"

  # Service configuration
  SPIDER_GRPC_PORT: "9001"
  SPIDER_HEALTH_PORT: "8080"
  CONDUCTOR_HEALTH_PORT: "8080"
  CARTOGRAPHER_HEALTH_PORT: "8080"
  SEARCHER_GRPC_PORT: "9002"
  SEARCHER_HEALTH_PORT: "8080"

  # Prometheus configuration
  PROMETHEUS_PORT: "9090"
  METRICS_PORT: "9090"

  # AWS configuration (for production, use real SQS)
  AWS_REGION: us-east-1
  QUEUE_URL: https://sqs.us-east-1.amazonaws.com/123456789012/search-engine-queue

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: search-engine
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'search-engine'
        environment: 'production'

    # Alertmanager configuration
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    # Load alert rules
    rule_files:
      - '/etc/prometheus/alert-rules/*.yml'

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Spider service metrics
      - job_name: 'spider'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: spider
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # Conductor service metrics
      - job_name: 'conductor'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: conductor
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # Cartographer service metrics
      - job_name: 'cartographer'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: cartographer
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # Searcher service metrics
      - job_name: 'searcher'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - search-engine
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: searcher
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # Kubernetes node metrics
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      # Kubernetes pods
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kubernetes_pod_name

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-rules
  namespace: search-engine
  labels:
    app: prometheus
data:
  alert-rules.yml: |
    groups:
      - name: search-engine-alerts
        interval: 30s
        rules:
          # Service availability
          - alert: ServiceDown
            expr: up{job=~"spider|conductor|cartographer|searcher"} == 0
            for: 2m
            labels:
              severity: critical
              service: '{{ $labels.job }}'
            annotations:
              summary: "{{ $labels.job }} service is down"
              description: "{{ $labels.job }} has been down for more than 2 minutes"

          # Spider-specific alerts
          - alert: SpiderHighFailureRate
            expr: rate(spider_pages_failed_total[5m]) > 0.1
            for: 5m
            labels:
              severity: warning
              service: spider
            annotations:
              summary: "Spider high failure rate"
              description: "Spider failure rate is {{ $value | humanizePercentage }} over 5 minutes"

          - alert: SpiderQueueDepthHigh
            expr: spider_queue_depth > 10000
            for: 10m
            labels:
              severity: warning
              service: spider
            annotations:
              summary: "Spider queue depth is high"
              description: "Spider queue depth is {{ $value }} (threshold: 10000)"

          - alert: SpiderCrawlLatencyHigh
            expr: histogram_quantile(0.95, rate(spider_crawl_duration_seconds_bucket[5m])) > 10
            for: 5m
            labels:
              severity: warning
              service: spider
            annotations:
              summary: "Spider crawl latency is high"
              description: "Spider p95 crawl latency is {{ $value | humanizeDuration }}"

          # Conductor-specific alerts
          - alert: ConductorHighDuplicateRate
            expr: rate(conductor_duplicate_pages_total[5m]) / rate(conductor_pages_received_total[5m]) > 0.3
            for: 5m
            labels:
              severity: info
              service: conductor
            annotations:
              summary: "Conductor duplicate rate is high"
              description: "Duplicate rate is {{ $value | humanizePercentage }}"

          - alert: ConductorDatabaseErrorRate
            expr: rate(conductor_database_errors_total[5m]) > 0.01
            for: 5m
            labels:
              severity: warning
              service: conductor
            annotations:
              summary: "Conductor database error rate is high"
              description: "Database error rate is {{ $value }}/sec"

          # Searcher-specific alerts
          - alert: SearcherQueryLatencyHigh
            expr: histogram_quantile(0.95, rate(searcher_query_duration_seconds_bucket[5m])) > 5
            for: 5m
            labels:
              severity: warning
              service: searcher
            annotations:
              summary: "Searcher query latency is high"
              description: "Searcher p95 query latency is {{ $value | humanizeDuration }}"

          - alert: SearcherErrorRate
            expr: rate(searcher_errors_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
              service: searcher
            annotations:
              summary: "Searcher error rate is high"
              description: "Error rate is {{ $value | humanizePercentage }}"

          # Database alerts
          - alert: DatabaseConnectionPoolExhausted
            expr: db_open_connections >= db_max_open_connections * 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Database connection pool nearing capacity"
              description: "Open connections {{ $value }} / {{ $value | humanize }} max"

          - alert: HighErrorRate
            expr: (rate(spider_pages_failed_total[5m]) + rate(conductor_database_errors_total[5m]) + rate(searcher_errors_total[5m])) > 0.1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Overall system error rate is critical"
              description: "System error rate exceeds 10%"
