# Secrets Management for Search Engine
# =====================================
#
# IMPORTANT: DO NOT commit actual secrets to Git!
#
# This file provides instructions for creating secrets in Kubernetes.
# Choose one of the following approaches based on your environment:
#
# OPTION A: Manual Secrets (Quick Start / Development)
# -----------------------------------------------------
# Create secrets directly from the command line:
#
# kubectl create secret generic search-engine-secrets \
#   --namespace=search-engine \
#   --from-literal=DB_USER=postgres \
#   --from-literal=DB_PASSWORD=YOUR_STRONG_PASSWORD_HERE \
#   --from-literal=GRAFANA_PASSWORD=YOUR_GRAFANA_PASSWORD
#
# kubectl create secret generic aws-credentials \
#   --namespace=search-engine \
#   --from-literal=AWS_ACCESS_KEY_ID=AKIAXXXXXXXXXXXXXX \
#   --from-literal=AWS_SECRET_ACCESS_KEY=XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX \
#   --from-literal=AWS_REGION=eu-west-1
#
#
# OPTION B: Sealed Secrets (GitOps - Recommended)
# ------------------------------------------------
# 1. Install sealed-secrets controller:
#    kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/controller.yaml
#
# 2. Install kubeseal CLI:
#    brew install kubeseal
#
# 3. Create and seal your secrets:
#    echo -n postgres | kubectl create secret generic search-engine-secrets \
#      --namespace=search-engine \
#      --dry-run=client \
#      --from-literal=DB_USER=postgres \
#      --from-literal=DB_PASSWORD=YOUR_PASSWORD -o yaml | \
#      kubeseal -o yaml > sealed-secrets.yaml
#
# 4. Commit sealed-secrets.yaml to Git (it's encrypted!)
# 5. Apply: kubectl apply -f sealed-secrets.yaml
#
#
# OPTION C: External Secrets Operator (Production - AWS/GCP/Azure)
# -----------------------------------------------------------------
# 1. Install External Secrets Operator:
#    helm repo add external-secrets https://charts.external-secrets.io
#    helm install external-secrets external-secrets/external-secrets -n external-secrets-system --create-namespace
#
# 2. Create SecretStore (AWS Secrets Manager example):
---
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: aws-secrets-manager
#   namespace: search-engine
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: eu-west-1
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: external-secrets
#
# 3. Create ExternalSecret resources:
# ---
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: search-engine-secrets
#   namespace: search-engine
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: SecretStore
#   target:
#     name: search-engine-secrets
#     creationPolicy: Owner
#   data:
#   - secretKey: DB_USER
#     remoteRef:
#       key: search-engine/postgres
#       property: username
#   - secretKey: DB_PASSWORD
#     remoteRef:
#       key: search-engine/postgres
#       property: password
#
#
# OPTION D: From .env File (Local Development Only)
# --------------------------------------------------
# 1. Create a .env file (DO NOT commit to Git!):
#    echo ".env" >> .gitignore
#    cat > .env <<EOF
#    DB_USER=postgres
#    DB_PASSWORD=YOUR_PASSWORD
#    AWS_ACCESS_KEY_ID=AKIAXXXXXX
#    AWS_SECRET_ACCESS_KEY=XXXXXXXX
#    EOF
#
# 2. Create secret from file:
#    kubectl create secret generic search-engine-secrets \
#      --namespace=search-engine \
#      --from-env-file=.env
#
#
# Verification
# ------------
# After creating secrets, verify they exist:
#   kubectl get secrets -n search-engine
#   kubectl describe secret search-engine-secrets -n search-engine
#
# Test secret values (DO NOT run in production logs):
#   kubectl get secret search-engine-secrets -n search-engine -o jsonpath='{.data.DB_USER}' | base64 --decode
#
#
# DEVELOPMENT ONLY: Template Secret (Insecure)
# ----------------------------------------------
# For local development only, you can apply this template:
# WARNING: These are default credentials. NEVER use in production!
#
---
apiVersion: v1
kind: Secret
metadata:
  name: search-engine-secrets
  namespace: search-engine
  labels:
    app: search-engine
    environment: development
type: Opaque
stringData:
  # Plain text for development (auto-encoded to base64)
  DB_USER: postgres
  DB_PASSWORD: postgres
  GRAFANA_PASSWORD: admin
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: eu-west-1
