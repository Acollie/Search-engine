# Kind-specific service overrides.
# Replaces LoadBalancer services with NodePort so kind port mappings work.
# Apply AFTER the main manifests: kubectl apply -f deployments/kind-services.yaml
---
# Frontend: NodePort 30000 → host :3000
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: search-engine
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30000
      protocol: TCP

---
# Spider health: NodePort 30001 → host :8001
apiVersion: v1
kind: Service
metadata:
  name: spider
  namespace: search-engine
  labels:
    app: spider
spec:
  type: NodePort
  selector:
    app: spider
  ports:
    - name: grpc
      port: 9001
      targetPort: 9001
      protocol: TCP
    - name: health
      port: 8080
      targetPort: 8080
      nodePort: 30001
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

