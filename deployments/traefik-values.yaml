# Traefik Helm values for Hetzner Cloud k3s cluster.
# The Hetzner Load Balancer (provisioned by Terraform) forwards :80→30080 and :443→30443.
# Traefik uses NodePort so the LB can reach it; the LB's public IP is the external entry point.
#
# Install with:
#   helm repo add traefik https://traefik.github.io/charts && helm repo update
#   helm upgrade --install traefik traefik/traefik \
#     --namespace kube-system \
#     --values deployments/traefik-values.yaml

service:
  type: NodePort

ports:
  web:
    nodePort: 30080
  websecure:
    nodePort: 30443

additionalArguments:
  - "--entrypoints.web.http.redirections.entrypoint.to=:443"
  - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
  - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true

logs:
  general:
    level: INFO

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
