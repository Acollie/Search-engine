---
apiVersion: v1
kind: Service
metadata:
  name: spider
  namespace: search-engine
  labels:
    app: spider
spec:
  type: ClusterIP
  selector:
    app: spider
  ports:
    - name: grpc
      port: 9001
      targetPort: 9001
      protocol: TCP
    - name: health
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spider
  namespace: search-engine
  labels:
    app: spider
    version: v1
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: spider
  template:
    metadata:
      labels:
        app: spider
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: spider
      imagePullSecrets:
        - name: registry-search-engine
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        - name: spider
          image: registry.digitalocean.com/search-engine/spider:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9001
              protocol: TCP
            - name: health
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: search-engine-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: search-engine-secrets
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: search-engine-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: search-engine-config
                  key: DB_NAME
            - name: SPIDER_GRPC_PORT
              valueFrom:
                configMapKeyRef:
                  name: search-engine-config
                  key: SPIDER_GRPC_PORT
            - name: SPIDER_HEALTH_PORT
              valueFrom:
                configMapKeyRef:
                  name: search-engine-config
                  key: SPIDER_HEALTH_PORT
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: search-engine-config
                  key: ENVIRONMENT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: search-engine-config
                  key: LOG_LEVEL
          resources:
            requests:
              cpu: 450m
              memory: 100Mi
            limits:
              cpu: 2
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/spider
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - spider
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spider
  namespace: search-engine
  labels:
    app: spider

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: spider
  namespace: search-engine
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: spider

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spider
  namespace: search-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spider
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
