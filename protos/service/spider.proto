syntax = "proto3";
package service;

option go_package = "webcrawler/pkg/generated/service/spider";

import "types/site.proto";

service Spider {
  rpc GetSeenList(stream SeenListRequest) returns (stream SeenListResponse);
  rpc GetHealth(HealthRequest) returns (HealthResponse);
}

message SeenListRequest {
  int32 limit = 1;  // limit The number of sites to return default is 10
  int32 offset = 3; // offset The number of sites to skip for pagination
  repeated types.Error errors = 2;
}

message SeenListResponse {
  repeated types.Page seen_sites = 1;
  repeated types.Error errors = 2;
}

message HealthRequest {}

message HealthResponse {
  Status status = 1;
}

message Status {
  bool healthy = 2;
  int32 tps = 3; // transactions per second
  int64 seen_sites = 4;
  int64 queued_sites = 5;
}
