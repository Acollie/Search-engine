version: '3.8'

# This docker-compose file sets up the search engine locally for development
# It includes all 4 microservices plus PostgreSQL database

services:
  # PostgreSQL Database - Central storage for all services
  postgres:
    image: postgres:15-alpine
    container_name: search-engine-postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: databaseName
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pkg/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - search-engine

  # Spider Service - Web crawler that discovers and fetches pages
  spider:
    build:
      context: .
      dockerfile: ./cmd/spider/Dockerfile
    container_name: search-engine-spider
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: databaseName
    ports:
      - "9001:9090"  # gRPC port
      - "8001:8080"  # Health/metrics port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - search-engine
    labels:
      - "prometheus-job=spider"

  # Conductor Service - Deduplication and queue management
  conductor:
    build:
      context: .
      dockerfile: ./cmd/conductor/Dockerfile
    container_name: search-engine-conductor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      spider:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: databaseName
    ports:
      - "8002:8080"  # Health/metrics port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - search-engine
    labels:
      - "prometheus-job=conductor"

  # Cartographer Service - PageRank computation (runs as batch job)
  cartographer:
    build:
      context: .
      dockerfile: ./cmd/cartographer/Dockerfile
    container_name: search-engine-cartographer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: databaseName
    ports:
      - "8003:8080"  # Health/metrics port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - search-engine
    labels:
      - "prometheus-job=cartographer"

  # Searcher Service - Full-text search with PageRank boosting
  searcher:
    build:
      context: .
      dockerfile: ./cmd/searcher/Dockerfile
    container_name: search-engine-searcher
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: databaseName
    ports:
      - "9002:9091"  # gRPC port
      - "8004:8080"  # Health/metrics port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - search-engine
    labels:
      - "prometheus-job=searcher"

  # Frontend Service - User-facing web interface
  frontend:
    build:
      context: .
      dockerfile: ./cmd/frontend/Dockerfile
    container_name: search-engine-frontend
    restart: unless-stopped
    depends_on:
      searcher:
        condition: service_healthy
    environment:
      PORT: "3000"
      HEALTH_PORT: "8080"
      SEARCHER_HOST: searcher
      SEARCHER_PORT: "9091"
    ports:
      - "3000:3000"  # HTTP web interface
      - "8005:8080"  # Health/metrics port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - search-engine
    labels:
      - "prometheus-job=frontend"

  # Adminer - Database management UI (optional)
  adminer:
    image: adminer:latest
    container_name: search-engine-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8888:8080"  # Fixed port to avoid conflicts
    networks:
      - search-engine
    environment:
      ADMINER_DEFAULT_SERVER: postgres

networks:
  search-engine:
    driver: bridge

volumes:
  postgres_data:
    driver: local
