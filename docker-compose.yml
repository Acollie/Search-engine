version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: search-engine-postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_DB: databaseName
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pkg/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - search-engine

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: search-engine-elasticmq
    restart: unless-stopped
    ports:
      - "9324:9324"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9324/?Action=ListQueues || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - search-engine

  spider:
    build:
      context: .
      dockerfile: ./cmd/spider/Dockerfile
    container_name: search-engine-spider
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: databaseName
    ports:
      - "9001:9090"
      - "8001:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - search-engine

  conductor:
    build:
      context: .
      dockerfile: ./cmd/conductor/Dockerfile
    container_name: search-engine-conductor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      elasticmq:
        condition: service_healthy
      spider:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: databaseName
      QUEUE_URL: http://elasticmq:9324/000000000000/search-queue
      SQS_ENDPOINT: http://elasticmq:9324
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      SPIDER_HOST: spider
      SPIDER_PORT: "9090"
    ports:
      - "8002:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - search-engine

  cartographer:
    build:
      context: .
      dockerfile: ./cmd/cartographer/Dockerfile
    container_name: search-engine-cartographer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: databaseName
      ENABLE_HTTP_TRIGGER: "true"
    ports:
      - "8003:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - search-engine

  searcher:
    build:
      context: .
      dockerfile: ./cmd/searcher/Dockerfile
    container_name: search-engine-searcher
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_NAME: databaseName
    ports:
      - "9002:9091"
      - "8004:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - search-engine

  frontend:
    build:
      context: .
      dockerfile: ./cmd/frontend/Dockerfile
    container_name: search-engine-frontend
    restart: unless-stopped
    depends_on:
      searcher:
        condition: service_healthy
    environment:
      PORT: "3000"
      HEALTH_PORT: "8080"
      SEARCHER_HOST: searcher
      SEARCHER_PORT: "9091"
    ports:
      - "3000:3000"
      - "8005:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - search-engine

  adminer:
    image: adminer:latest
    container_name: search-engine-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8888:8080"
    networks:
      - search-engine
    environment:
      ADMINER_DEFAULT_SERVER: postgres

networks:
  search-engine:
    driver: bridge

volumes:
  postgres_data:
    driver: local
