# AlertManager configuration for Search Engine

global:
  resolve_timeout: 5m

# Templates for alert notifications
templates: []

# Routes for different alert types
route:
  # Default receiver
  receiver: 'null'

  # Routes for different services
  routes:
    # Critical alerts go to all channels
    - match:
        severity: critical
      receiver: 'slack-critical'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    # Warning alerts
    - match:
        severity: warning
      receiver: 'slack-warning'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 12h

    # Info alerts
    - match:
        severity: info
      receiver: 'null'
      group_by: ['alertname', 'cluster']
      group_wait: 5m
      group_interval: 30m
      repeat_interval: 24h

# Receivers
receivers:
  - name: 'null'

  # For local dev: set SLACK_WEBHOOK_URL env var or replace with your webhook URL
  - name: 'slack-critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE_FOR_LOCAL_DEV'
        channel: '#alerts'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '{{ if eq .Status "firing" }}[FIRING]{{ else }}[RESOLVED]{{ end }} {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts -}}
          *Service:* {{ .Labels.job }}  *Severity:* {{ .Labels.severity | toUpper }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: 'slack-warning'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE_FOR_LOCAL_DEV'
        channel: '#alerts'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '{{ if eq .Status "firing" }}[FIRING]{{ else }}[RESOLVED]{{ end }} {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts -}}
          *Service:* {{ .Labels.job }}  *Severity:* {{ .Labels.severity | toUpper }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

# Inhibition rules to prevent alert noise
inhibit_rules:
  # Inhibit warning alerts if critical alert exists
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

  # Inhibit info alerts if warning alert exists
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'cluster', 'service']

  # Don't alert if service is down (covered by ServiceDown alert)
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*HighErrorRate|.*HighLatency|.*QueueDepth'
    equal: ['service', 'cluster']
