# Prometheus configuration for Search Engine monitoring

global:
  scrape_interval: 15s      # Default scrape interval
  evaluation_interval: 15s   # Evaluation interval for rules
  external_labels:
    cluster: 'search-engine-local'
    environment: 'local'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spider Service
  - job_name: 'spider'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['spider:8080']
        labels:
          service: spider
          instance: 'spider-1'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance_address

  # Conductor Service
  - job_name: 'conductor'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['conductor:8080']
        labels:
          service: conductor
          instance: 'conductor-1'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance_address

  # Cartographer Service
  - job_name: 'cartographer'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['cartographer:8080']
        labels:
          service: cartographer
          instance: 'cartographer-1'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance_address

  # Searcher Service
  - job_name: 'searcher'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['searcher:8080']
        labels:
          service: searcher
          instance: 'searcher-1'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance_address

  # PostgreSQL via postgres_exporter (optional, add if using postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
        labels:
          service: postgresql
    metrics_path: '/metrics'

  # Node Exporter - Host metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'docker-host'

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'docker-containers'
    metrics_path: '/metrics'

  # AlertManager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
        labels:
          service: alertmanager

  # Redis (for future caching layer)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: redis
