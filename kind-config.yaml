kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: search-engine
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Frontend
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      # Spider health
      - containerPort: 30001
        hostPort: 8001
        protocol: TCP
      # Conductor health
      - containerPort: 30002
        hostPort: 8002
        protocol: TCP
      # Cartographer health
      - containerPort: 30003
        hostPort: 8003
        protocol: TCP
      # Searcher health
      - containerPort: 30004
        hostPort: 8004
        protocol: TCP
  - role: worker
  - role: worker
